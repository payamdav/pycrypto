<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>LSTM Single-Head Quantile (Huber) — Observation Reports</title>
  <link rel="preconnect" href="https://storage.googleapis.com" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__title">
      <h1>Observation Reports</h1>
      <p class="app-header__subtitle" id="setNameLabel">Lookback / Lookahead LSTM Single-Head (Quantile, Huber Loss)</p>
    </div>
    <div class="app-header__controls">
      <button class="btn btn--nav" id="prevBtn" title="Previous report" disabled>&#8592; Prev</button>
      <select class="report-select" id="reportSelect" aria-label="Select a report">
        <option value="">Loading reports…</option>
      </select>
      <button class="btn btn--nav" id="nextBtn" title="Next report" disabled>Next &#8594;</button>
      <button class="btn btn--ghost" id="reloadBtn" title="Reload report list">&#8635;</button>
    </div>
  </header>

  <div class="source-bar">
    <span class="source-bar__status" id="statusLabel">Initializing…</span>
    <div class="source-bar__actions">
      <label class="file-upload">
        <input type="file" id="fileInput" accept="application/json,.json" />
        <span>Upload JSON</span>
      </label>
      <div class="url-paste">
        <input type="text" id="urlInput" placeholder="Paste a report URL…" />
        <button class="btn btn--ghost" id="urlLoadBtn">Load URL</button>
      </div>
    </div>
  </div>

  <main class="content" id="content">
    <div class="placeholder" id="placeholder">
      <div class="placeholder__card">
        <h2>No report loaded</h2>
        <p>Select a report from the dropdown, or upload / paste a report JSON to begin.</p>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <span id="footerInfo"></span>
  </footer>

  <!-- All resources are loaded dynamically with a cache-busting timestamp
       so every page load fetches fresh copies from the server. -->
  <script>
    (function () {
      var ts = Date.now();

      // CSS — cache-busted
      var link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "css/styles.css?v=" + ts;
      document.head.appendChild(link);

      // Scripts must load in dependency order. Each waits for the previous
      // to finish before starting, using onload chaining.
      var SCRIPTS = [
        "https://cdn.plot.ly/plotly-2.35.2.min.js?v=" + ts,
        "js/config.js?v=" + ts,
        "js/gcs.js?v=" + ts,
        "js/render.js?v=" + ts,
        "js/app.js?v=" + ts,
      ];

      function loadNext(i) {
        if (i >= SCRIPTS.length) return;
        var s = document.createElement("script");
        s.src = SCRIPTS[i];
        s.onload = function () { loadNext(i + 1); };
        s.onerror = function () {
          document.body.innerHTML =
            '<div style="color:#ff6b6b;padding:2rem;font-family:monospace">' +
            "ERROR: Failed to load required script: " + SCRIPTS[i] +
            "</div>";
        };
        document.body.appendChild(s);
      }
      loadNext(0);
    })();
  </script>
</body>
</html>

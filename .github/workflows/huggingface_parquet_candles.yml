name: Update HuggingFace Parquet Candles

on:
  schedule:
    - cron: "0 6 3 * *"   # 3rd of every month at 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-parquet-candles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/huggingface_parquet_candles/requirements.txt

      - name: Run updater
        env:
          HUGGINGFACE_FULL_TOKEN: ${{ secrets.HUGGINGFACE_FULL_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}/packages
        run: python scripts/huggingface_parquet_candles/update_huggingface_parquet_candles.py --full

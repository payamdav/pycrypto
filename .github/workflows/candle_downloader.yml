name: Download Monthly Candles to HuggingFace

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install huggingface_hub requests

      - name: Run candle downloader
        env:
          HUGGINGFACE_FULL_TOKEN: ${{ secrets.HUGGINGFACE_FULL_TOKEN }}
        run: |
          python scripts/candle_downloader/download_monthly_candle_file_and_upload_to_huggingface.py
